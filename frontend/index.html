<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#F5F1EA" />
    <meta name="description" content="설해원 AI CRM — 통합 운영 대시보드" />

    <!-- 백엔드 API 사전 연결: DNS/TCP/TLS 핸드셰이크를 main.tsx 로드와 병렬 -->
    <link rel="preconnect" href="https://seolhaeone.vercel.app" crossorigin />
    <link rel="dns-prefetch" href="https://seolhaeone.vercel.app" />

    <title>설해원 AI CRM</title>
    <style>
      /* CLS 방지 + 스크립트 로드 전 즉시 보이는 로딩 표시 */
      html, body { margin: 0; padding: 0; background: #F5F1EA; color: #1E1B17; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif; }
      #root { min-height: 100vh; }
      .__boot {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #F5F1EA; z-index: 0;
      }
      .__boot::after {
        content: ""; width: 28px; height: 28px; border-radius: 50%;
        border: 2px solid rgba(30,27,23,0.15); border-top-color: #C5A55A;
        animation: __spin 0.8s linear infinite;
      }
      @keyframes __spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <script>
      // SPA redirect restore for GitHub Pages
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <div id="root"><div class="__boot"></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
