services:
  postgres:
    image: postgres:16-alpine
    container_name: seolhae-db
    environment:
      POSTGRES_DB: seolhaeone
      POSTGRES_USER: seolhae
      POSTGRES_PASSWORD: seolhae1234
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seolhae -d seolhaeone"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seolhae-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
